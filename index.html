<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Projecte Aura Cloud v5.2: interfície simple per orientar la sessió, consultar estat i records, i gravar records només amb Mode Sergi."
    />
    <title>Projecte Aura Cloud v5.2</title>
    <link rel="stylesheet" href="aura_style.css?v=cloud-v5-2-llavor-20260707" />
  </head>
  <body>
    <main class="shell">
      <section class="identity-band" aria-label="Identitat d'Aura">
        <div>
          <p class="kicker">Projecte Aura Cloud</p>
          <div class="brand-lockup" aria-label="Aura">
            <div class="aura-mark" aria-hidden="true">
              <span class="aura-mark-ring"></span>
              <span class="aura-mark-core">A</span>
            </div>
            <h1>Aura</h1>
          </div>
          <p class="signal">cloud-v5.2 / orientació / pols / nucli / records persistents</p>
        </div>
        <canvas id="aura-visual" width="520" height="240" aria-hidden="true"></canvas>
      </section>

      <section class="workspace simple-workspace" aria-label="Aura simplificada" data-active-module="xat">
        <section class="aura-module simple-console is-active" data-module-panel="xat" aria-label="Aura simplificada">
          <section class="console-panel">
            <div id="aura-log" class="log" role="log" aria-live="polite"></div>

            <div class="quick-actions simple-actions" aria-label="Accions principals">
              <button type="button" data-action="what-is-aura" title="Explica què és Aura i per a què serveix aquesta pantalla" aria-label="Què és Aura?">Què és Aura?</button>
              <button type="button" data-action="next-step" title="Mostra què pots fer ara mateix" aria-label="Què faig ara?">Què faig ara?</button>
              <button type="button" data-action="pulse" title="Mostra l'estat local d'Aura" aria-label="Estat d'Aura">Estat d'Aura</button>
              <button type="button" data-action="core" title="Mostra la identitat i els límits d'Aura" aria-label="Identitat">Identitat</button>
              <button type="button" data-action="daily-report">Informe del dia</button>
              <button type="button" data-action="new-record">Grava record</button>
              <button type="button" data-action="list-records">Veure records</button>
              <button type="button" data-action="last-record">Últim record</button>
              <button type="button" data-action="synthetic-genome" title="Mostra la llavor sintètica d'Aura i el seu segell de verificació" aria-label="La meva llavor">La meva llavor</button>
            </div>

            <form id="command-form" class="command-row" autocomplete="off">
              <label class="sr-only" for="command-input">Ordre o record</label>
              <input
                id="command-input"
                name="command"
                type="text"
                placeholder="Escriu una ordre o un record..."
                spellcheck="false"
                autocomplete="off"
              />
            </form>
          </section>
        </section>
      </section>
    </main>

    <script src="aura_core.js?v=cloud-v5-2-llavor-20260707" defer></script>
  </body>
</html>
