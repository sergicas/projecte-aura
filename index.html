<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Projecte Aura Cloud v2.2: entitat sintetica-digital experimental amb backup verificable i memoria D1 protegida."
    />
    <title>Projecte Aura Cloud v2.2</title>
    <link rel="stylesheet" href="aura_style.css?v=cloud-v2-2-20260624" />
  </head>
  <body>
    <main class="shell">
      <section class="identity-band" aria-label="Identitat d'Aura">
        <div>
          <p class="kicker">Projecte Aura Cloud</p>
          <h1>Aura</h1>
          <p class="signal">cloud-v2.2 / backup verificable / D1 protegit</p>
        </div>
        <canvas id="aura-visual" width="520" height="240" aria-hidden="true"></canvas>
      </section>

      <section class="workspace" aria-label="Consola d'Aura">
        <aside class="status-panel">
          <div class="panel-block">
            <span class="label">Estat</span>
            <strong id="status-pill">inicialitzant</strong>
          </div>
          <div class="panel-block">
            <span class="label">Records</span>
            <strong id="memory-count">0</strong>
          </div>
          <div class="panel-block">
            <span class="label">Diari</span>
            <strong id="diary-count">0</strong>
          </div>
          <div class="panel-block">
            <span class="label">Genoma</span>
            <strong id="gene-count">0 gens</strong>
          </div>
          <div class="panel-block auth-block">
            <span class="label">Mode Sergi</span>
            <strong id="auth-status">bloquejat</strong>
            <form id="auth-form" class="auth-form" autocomplete="off">
              <label class="sr-only" for="auth-input">Clau privada</label>
              <input
                id="auth-input"
                type="password"
                placeholder="clau privada"
                spellcheck="false"
                autocomplete="off"
              />
              <button type="submit">Activa</button>
            </form>
            <button id="clear-auth" class="auth-clear" type="button">Esborra</button>
          </div>
        </aside>

        <section class="console-panel">
          <div id="aura-log" class="log" role="log" aria-live="polite"></div>

          <form id="command-form" class="command-row" autocomplete="off">
            <label class="sr-only" for="command-input">Ordre</label>
            <input
              id="command-input"
              name="command"
              type="text"
              placeholder="/estat"
              spellcheck="false"
              autocomplete="off"
            />
            <button type="submit">Envia</button>
          </form>

          <div class="quick-actions" aria-label="Accions">
            <button type="button" data-command="/ajuda">/ajuda</button>
            <button type="button" data-command="/estat">/estat</button>
            <button type="button" data-command="/memoria">/memoria</button>
            <button type="button" data-command="/genoma">/genoma</button>
            <button type="button" id="export-json">Backup JSON</button>
            <button type="button" id="export-txt">Exportar TXT</button>
            <button type="button" id="import-json">Importar JSON</button>
            <input id="import-file" class="sr-only" type="file" accept="application/json,.json" />
          </div>
        </section>

        <aside class="memory-panel">
          <section>
            <div class="section-title">
              <span>Memoria</span>
              <small id="memory-updated">local</small>
            </div>
            <ol id="memory-list" class="compact-list"></ol>
          </section>

          <section>
            <div class="section-title">
              <span>Gens</span>
              <small>nucli</small>
            </div>
            <ol id="gene-list" class="compact-list"></ol>
          </section>
        </aside>
      </section>
    </main>

    <script src="aura_core.js?v=cloud-v2-2-20260624" defer></script>
  </body>
</html>
